# ============================================
#        RegionFlag - Configuração
#        Autor: Eduardo12B
# ============================================

# Prefixo das mensagens no chat
prefix: "&#7C3AED&lRegionFlag &8» &7"

# Modo debug (mostra logs detalhados no console)
debug: false

# Configurações de title padrão (em ticks: 20 ticks = 1 segundo)
title:
  fadeIn: 10
  stay: 70
  fadeOut: 20

# Cooldowns padrão por flag (em segundos)
cooldowns:
  playsound: 5
  console_command: 10
  title: 15
  teleport: 10

# Configurações de visualização (partículas)
visualizer:
  particle: FLAME
  duration: 5  # segundos
  density: 0.5 # distância entre partículas (blocos)

# Backup automático
backup:
  enabled: true
  interval: 300 # segundos (5 minutos)

# ============================================
#           Mensagens
# ============================================
messages:
  # Geral
  no-permission: "&cVocê não tem permissão para isso."
  player-only: "&cApenas jogadores podem executar este comando."
  reload-success: "&aConfiguração recarregada com sucesso!"
  unknown-command: "&cComando desconhecido. Use &e/regiao &cpara ajuda."

  # Seleção de posições
  pos1-set: "&aPosição 1 definida em &e(%x%, %y%, %z%)&a."
  pos2-set: "&aPosição 2 definida em &e(%x%, %y%, %z%)&a."
  pos-incomplete: "&cVocê precisa definir as posições 1 e 2 primeiro."

  # Regiões
  region-created: "&aRegião &e%name% &acriada com sucesso!"
  region-deleted: "&aRegião &e%name% &adeletada com sucesso!"
  region-not-found: "&cRegião &e%name% &cnão encontrada."
  region-already-exists: "&cJá existe uma região com o nome &e%name%&c."
  region-list-header: "&6Regiões no mundo &e%world%&6:"
  region-list-entry: "  &8- &e%name% &7(prioridade: &f%priority%&7)"
  region-list-empty: "&7Nenhuma região encontrada."
  region-info-header: "&6=== Região: &e%name% &6==="
  region-info-world: "&7Mundo: &f%world%"
  region-info-pos1: "&7Pos1: &f(%x1%, %y1%, %z1%)"
  region-info-pos2: "&7Pos2: &f(%x2%, %y2%, %z2%)"
  region-info-priority: "&7Prioridade: &f%priority%"
  region-info-flags: "&7Flags: &f%flags%"

  # Flags
  flag-playsound-added: "&aSom &e%sound% &aadicionado à região &e%region%&a."
  flag-playsound-removed: "&aSom removido da região &e%region%&a."
  flag-playsound-list: "&7Sons: &f%sounds%"
  flag-command-added: "&aComando adicionado à região &e%region%&a."
  flag-command-removed: "&aComando removido da região &e%region%&a."
  flag-command-list: "&7Comandos: &f%commands%"
  flag-title-set: "&aTitle configurado para a região &e%region%&a."
  flag-title-removed: "&aTitle removido da região &e%region%&a."
  flag-removed: "&aFlag &e%flag% &aremovida da região &e%region%&a."
  flag-teleport-set: "&aTeleport configurado para a região &e%region%&a."
  flag-teleport-removed: "&aTeleport removido da região &e%region%&a."

  # Prioridade
  priority-set: "&aPrioridade da região &e%name% &adefinida para &e%priority%&a."

  # Debug
  debug-enabled: "&aDebug &eativado&a."
  debug-disabled: "&aDebug &edesativado&a."

  # Visualizar
  visualize-start: "&aVisualizando região &e%name%&a por &e%duration%s&a."

  # Ajuda
